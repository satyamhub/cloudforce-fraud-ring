<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloudforce | Demo Video</title>
    <style>
      :root {
        --bg: #f6ecdf;
        --panel: rgba(255, 255, 255, 0.78);
        --text: #1f2933;
        --muted: #5f6b76;
        --accent: #d97706;
        --accent-dark: #9a4d00;
        --border: rgba(153, 110, 58, 0.18);
        --shadow: 0 24px 80px rgba(88, 47, 10, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter,
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 255, 255, 0.8),
            transparent 32%
          ),
          radial-gradient(
            circle at 85% 20%,
            rgba(217, 119, 6, 0.12),
            transparent 28%
          ),
          linear-gradient(180deg, #fff7eb 0%, var(--bg) 52%, #f0e0c7 100%);
        display: grid;
        place-items: center;
        padding: 32px 18px;
      }

      .wrap {
        width: min(1120px, 100%);
        display: grid;
        gap: 18px;
      }

      .hero {
        padding: 24px 26px 0;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent-dark);
        font-weight: 700;
        margin-bottom: 10px;
      }

      .title {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.8rem);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      .subtitle {
        margin: 14px 0 0;
        max-width: 66ch;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 13px 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.01em;
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          background-color 140ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button.primary {
        background: linear-gradient(135deg, var(--accent) 0%, #f59e0b 100%);
        color: #fff;
        box-shadow: 0 16px 28px rgba(217, 119, 6, 0.25);
      }

      .button.primary:hover {
        box-shadow: 0 18px 34px rgba(217, 119, 6, 0.3);
      }

      .button.secondary {
        background: rgba(255, 255, 255, 0.75);
        color: var(--accent-dark);
        border: 1px solid rgba(153, 110, 58, 0.16);
      }

      .button.secondary:hover {
        background: rgba(255, 255, 255, 0.92);
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        overflow: hidden;
      }

      .player {
        padding: 18px;
      }

      video {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 18px;
        background: #000;
        outline: none;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: space-between;
        align-items: center;
        padding: 0 26px 26px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(153, 110, 58, 0.14);
      }

      .pill strong {
        color: var(--accent-dark);
      }

      .link {
        color: var(--accent-dark);
        text-decoration: none;
        font-weight: 700;
      }

      .link:hover {
        text-decoration: underline;
      }

      @media (max-width: 700px) {
        body {
          padding: 16px;
        }
        .hero,
        .meta {
          padding-left: 18px;
          padding-right: 18px;
        }
        .player {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <div class="kicker">Cloudforce Demo Video</div>
        <h1 class="title">Submission Demo</h1>
        <p class="subtitle">Cloudforce fraud-ring walkthrough.</p>
        <div class="actions">
          <a
            class="button secondary"
            href="https://github.com/satyamhub/cloudforce-fraud-ring"
            target="_blank"
            rel="noreferrer"
          >
            GitHub Repo
          </a>
        </div>
      </section>

      <section class="card player" aria-label="Demo video player">
        <video
          controls
          playsinline
          preload="metadata"
          controlsList="nodownload noplaybackrate"
        >
          <source
            src="./fraud-ring-demo/submission/Cloudforce_Fraud_Ring_Demo_Male_Short.mp4"
            type="video/mp4"
          />
          Your browser does not support HTML video.
        </video>
      </section>

      <div class="meta">
        <span class="pill"
          ><strong>Tip</strong> Use fullscreen for the best view.</span
        >
        <span class="pill"
          >Video and source are both published on GitHub Pages.</span
        >
      </div>
    </main>
  </body>
</html>
